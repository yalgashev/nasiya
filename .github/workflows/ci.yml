name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dependency-sync:
    runs-on: ubuntu-latest
    env:
      APP_ENVIRONMENT: testing
      DEBUG: "false"
      SESSION_COOKIE_NAME: nasiya_session
      SESSION_COOKIE_SECURE: "false"
      SESSION_TTL_DAYS: "30"
      ANONYMOUS_SESSION_TTL_MINUTES: "30"
      SESSION_TOUCH_INTERVAL_MINUTES: "5"
      PASSWORD_MIN_LENGTH: "8"
      PASSWORD_MAX_LENGTH: "128"
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: "900"
      LOGIN_RATE_LIMIT_PHONE_ATTEMPTS: "5"
      LOGIN_RATE_LIMIT_IP_ATTEMPTS: "20"
      RATE_LIMIT_HMAC_KEY: ci-test-only-rate-limit-hmac-key-at-least-32-chars
      DATABASE_URL: postgresql+psycopg://nasiya:dev_pass@127.0.0.1:5432/nasiya_test
      TEST_DATABASE_URL: postgresql+psycopg://nasiya:dev_pass@127.0.0.1:5432/nasiya_test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nasiya_test
          POSTGRES_USER: nasiya
          POSTGRES_PASSWORD: dev_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nasiya -d nasiya_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Show Alembic current revision
        run: uv run alembic current

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run pytest
        run: uv run pytest -ra
