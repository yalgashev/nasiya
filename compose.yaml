services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nasiya}
      POSTGRES_USER: ${POSTGRES_USER:-nasiya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_pass}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nasiya} -d ${POSTGRES_DB:-nasiya}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+psycopg://${POSTGRES_USER:-nasiya}:${POSTGRES_PASSWORD:-dev_pass}@db:5432/${POSTGRES_DB:-nasiya}}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  db-data:
